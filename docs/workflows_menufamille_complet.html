<style>
#wfroot{font-family:'Anthropic Sans',sans-serif}
#wfroot *{box-sizing:border-box}
.wf-tabs{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px;margin-bottom:14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.wf-tab{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);white-space:nowrap;transition:all .15s;user-select:none;display:flex;align-items:center;gap:5px}
.wf-tab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wf-tab.active{background:#D4572A;color:#fff;border-color:#D4572A}
.wf-tab.active .dot{background:#fff!important}
.wf-head{margin-bottom:16px}
.wf-domain-badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:10px;margin-bottom:8px}
.wf-title{font-size:19px;font-weight:700;color:var(--color-text-primary);margin-bottom:4px}
.wf-sub{font-size:12px;color:var(--color-text-secondary);line-height:1.5;max-width:680px}
.wf-flow{position:relative;padding-left:6px;margin-top:18px}
.wf-step{display:flex;gap:12px;position:relative;padding-bottom:22px}
.wf-step:last-child{padding-bottom:0}
.wf-step::before{content:'';position:absolute;left:15px;top:32px;bottom:-4px;width:2px;background:var(--color-border-tertiary)}
.wf-step:last-child::before{display:none}
.wf-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;z-index:1}
.wf-body{flex:1;padding-top:2px}
.wf-action{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.wf-action .ic{font-size:13px}
.wf-sys{font-size:12px;color:var(--color-text-secondary);line-height:1.5;background:var(--color-background-secondary);border-radius:8px;border:0.5px solid var(--color-border-tertiary);padding:8px 11px}
.wf-branch{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.wf-branch-row{display:flex;gap:8px;align-items:flex-start;background:var(--color-background-primary);border:0.5px dashed var(--color-border-secondary);border-radius:8px;padding:7px 10px}
.wf-branch-lbl{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;flex-shrink:0;color:#fff;margin-top:1px}
.wf-branch-txt{font-size:11px;color:var(--color-text-secondary);line-height:1.45}
.wf-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;margin-bottom:4px}
.wf-meta-pill{font-size:10px;padding:3px 9px;border-radius:10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-tertiary)}
.wf-tables{font-family:var(--font-mono);font-size:9px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);padding:1px 6px;border-radius:6px;color:var(--color-text-tertiary)}
</style>

<div id="wfroot">
  <div class="wf-tabs" id="wf-tabs"></div>
  <div id="wf-content"></div>
</div>

function renderTabs(activeId){
  const tabsEl = document.getElementById('wf-tabs');
  tabsEl.innerHTML = WORKFLOWS.map(w => {
    const d = WF_DOMAINS[w.domain];
    return `<div class="wf-tab${w.id===activeId?' active':''}" onclick="selectWF('${w.id}')">
      <span class="dot" style="background:${d.color}"></span>${w.icon} ${w.title}
    </div>`;
  }).join('');
}

function renderContent(id){
  const w = WORKFLOWS.find(x=>x.id===id);
  const d = WF_DOMAINS[w.domain];
  const contentEl = document.getElementById('wf-content');

  let stepsHtml = w.steps.map((st,i) => `
    <div class="wf-step">
      <div class="wf-num" style="background:${d.color}">${i+1}</div>
      <div class="wf-body">
        <div class="wf-action"><span class="ic">${st.icon}</span>${st.action}</div>
        <div class="wf-sys">${st.sys}</div>
      </div>
    </div>`).join('');

  let branchesHtml = '';
  if (w.branches) {
    branchesHtml = `<div class="wf-branch">${w.branches.map(b => `
      <div class="wf-branch-row">
        <span class="wf-branch-lbl" style="background:${b.color}">${b.label}</span>
        <span class="wf-branch-txt">${b.text}</span>
      </div>`).join('')}</div>`;
  }

  contentEl.innerHTML = `
    <div class="wf-head">
      <span class="wf-domain-badge" style="background:${d.color}22;color:${d.color}">${d.label}</span>
      <div class="wf-title">${w.icon} ${w.title}</div>
      <div class="wf-sub">${w.sub}</div>
      <div class="wf-meta">${w.tables.map(t=>`<span class="wf-meta-pill"><span class="wf-tables">${t}</span></span>`).join('')}</div>
    </div>
    <div class="wf-flow">${stepsHtml}</div>
    ${branchesHtml}
  `;
}

function selectWF(id){
  renderTabs(id);
  renderContent(id);
}

selectWF(WORKFLOWS[0].id);
</script>
